<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHSWatch — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a7a4a 0%, #27ae60 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        .login-card .card-body { padding: 2.5rem; }
        .brand-icon {
            width: 68px; height: 68px; border-radius: 50%;
            background: linear-gradient(135deg, #1a7a4a, #27ae60);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem; box-shadow: 0 4px 16px rgba(26,122,74,0.3);
        }
        .btn-login {
            background: linear-gradient(135deg, #1a7a4a, #27ae60);
            border: none; color: #fff; font-weight: 600; padding: 0.6rem 1rem;
        }
        .btn-login:hover { background: linear-gradient(135deg, #145e38, #1e9850); color: #fff; }
        .form-control:focus { border-color: #27ae60; box-shadow: 0 0 0 0.2rem rgba(39,174,96,0.2); }
        .footer-text { color: rgba(255,255,255,0.65); font-size: 0.78rem; text-align: center; margin-top: 1.5rem; }
    </style>
</head>
<body>
<div style="width:100%; max-width:420px; padding: 1rem;">
    <div class="card login-card">
        <div class="card-body">
            <div class="text-center mb-4">
                <div class="brand-icon">
                    <i class="bi bi-shield-check" style="font-size:2rem; color:#fff;"></i>
                </div>
                <h4 class="fw-bold mb-1">EHSWatch</h4>
                <p class="text-muted mb-0" style="font-size:0.88rem;">Report Validation Portal</p>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2 d-flex align-items-center gap-2" style="font-size:0.85rem;">
                <i class="bi bi-exclamation-circle-fill"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST" autocomplete="on">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="bi bi-person text-muted"></i>
                        </span>
                        <input type="text" name="username" class="form-control border-start-0"
                               placeholder="Enter username" required autofocus autocomplete="username">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="bi bi-lock text-muted"></i>
                        </span>
                        <input type="password" name="password" class="form-control border-start-0"
                               placeholder="Enter password" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn btn-login w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
        </div>
    </div>
    <p class="footer-text">EHSWatch Report Validation &copy; 2026 Exceego</p>
</div>
</body>
</html>
